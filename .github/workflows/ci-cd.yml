name: Dockerized CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 授予工作流向 GitHub 镜像仓库 (GHCR) 读写的权限
permissions:
  contents: read
  packages: write

jobs:
  # ---------------- 1. 构建并推送前端镜像 ----------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set lower case owner name
      run: |
        echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install & Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ghcr.io/shaochenheng/course_oss-frontend:latest

  # ---------------- 2. 构建并推送后端镜像 ----------------
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Backend JAR
      run: |
        cd backend
        mvn -B package -DskipTests --file pom.xml

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ghcr.io/shaochenheng/course_oss-backend:latest

  # ---------------- 3. 远程部署到 Ubuntu 服务器 ----------------
  deploy:
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: SSH Remote Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 1. 登录到 GitHub 镜像仓库 (确保服务器有权拉取最新镜像)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 2. 将用户名转换为小写
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # 3. 进入你的项目目录（Nginx 和数据库配置的老巢）
          cd /root/course_oss

          # 4. 核心魔法：只拉取你在 compose 里定义的前后端最新镜像
          # 这样做绝对不会影响到已经在运行的独立的 Nginx 或 MySQL 容器
          docker pull ghcr.io/shaochenheng/course_oss-frontend:latest
          docker pull ghcr.io/shaochenheng/course_oss-backend:latest

          # 5. 降维打击：用 compose 智能重启，实现无伤刷新！
          # --remove-orphans 会清理掉旧的残留容器
          docker compose version >/dev/null 2>&1 || { echo "❌ docker compose is not installed on the server"; exit 1; }
          docker compose up -d --remove-orphans --pull always

          # 6. 顺手清理废弃的旧镜像碎片，释放磁盘空间
          docker image prune -f

          echo "✨ [Compose-Mode] Deployment successfully accomplished without breaking configurations! ✨"
